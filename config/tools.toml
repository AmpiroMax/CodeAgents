[permissions]
default_mode = "propose"
allow_workspace_write = false
allow_network = false

# ─── File reading ────────────────────────────────────────────────────

[tools.read_file]
kind = "native"
permission = "read_only"
description = """Read a UTF-8 text file from the current workspace and return numbered lines. Use this before editing so you can quote exact context and line numbers.

Example: read_file {"path":"src/codeagents/agent.py","offset":1,"limit":80}
Example: read_file {"path":"README.md"}"""

[tools.read_file.params.path]
type = "string"
description = "Relative path to the file in the workspace"
required = true

[tools.read_file.params.offset]
type = "integer"
description = "Starting line number (1-based). Default: 1"
required = false

[tools.read_file.params.limit]
type = "integer"
description = "Maximum number of lines to return. Default: 200"
required = false

# ─── Console-style read-only commands ────────────────────────────────

[tools.pwd]
kind = "native"
permission = "read_only"
description = """Print the agent's current working directory and the workspace trust boundary.

Returns: cwd (where relative paths resolve), workspace_root (write boundary), and read_only (true when cwd has cd-ed outside workspace_root). Use this to confirm context before running file or shell tools.

Example: pwd {}"""

[tools.cd]
kind = "native"
permission = "read_only"
description = """Change the agent's current working directory.

Behaviour:
- Relative paths resolve against the current cwd; absolute paths and ~ are accepted.
- The new cwd may live anywhere on disk, including outside the workspace root.
- While cwd is INSIDE workspace_root: full permissions remain in effect (writes, shell, etc. work as configured).
- While cwd is OUTSIDE workspace_root: the agent enters READ-ONLY mode. Reads (read_file, cat, ls, grep, head, tail, wc) work anywhere, but write/destructive tools (write_file, edit_file, mkdir, mv, rm, shell-with-side-effects) refuse with a "path escapes workspace" error.
- Subsequent shell tools (safe_shell, run_command) execute from the new cwd by default.
- cd does NOT change which directory is trusted. To move the trust boundary itself (and refresh approvals/.codeagents), use change_workspace.

Returns: cwd, workspace_root, inside_workspace (bool), read_only (bool), notice (human-readable summary).

Example: cd {"path":"src/codeagents"}
Example: cd {"path":"~/other-project"}      # leaves workspace, agent becomes read-only
Example: cd {"path":".."}"""

[tools.cd.params.path]
type = "string"
description = "Target directory. Relative paths resolve against the current cwd; ~ and absolute paths are also accepted."
required = true

[tools.change_workspace]
kind = "native"
permission = "workspace_write"
description = """Switch the workspace root (trust boundary) to a new directory and reset cwd to it.

When to use: the user wants the agent to start operating on a different project / folder as its primary working area. For temporary navigation, prefer `cd` instead — it is non-destructive and does not touch approvals.

Behaviour:
- Creates the target directory if it does not exist, plus a .codeagents/ skeleton inside it.
- Resets cwd to the new root.
- Re-binds per-workspace state: approvals, audit log, and confirmation history. Approvals from the previous workspace do NOT carry over — the user may need to re-grant write/network permissions on the first relevant tool call inside the new root.
- Requires user confirmation (workspace_write permission) because it changes the security boundary.

Returns: workspace_root, cwd, notice describing the permission reset.

Example: change_workspace {"path":"~/code/new-project"}
Example: change_workspace {"path":"/Users/me/scratchpad"}"""

[tools.change_workspace.params.path]
type = "string"
description = "Absolute or ~-relative path to the new workspace root. Created if missing."
required = true

[tools.ls]
kind = "native"
permission = "read_only"
description = """List files and directories like the shell command `ls`, but safely scoped to the workspace. Use it to inspect a directory without running arbitrary shell.

Example: ls {"path":"src","long":true}
Example: ls {"path":".","all":true,"max_results":50}"""

[tools.ls.params.path]
type = "string"
description = "Relative path to list. Default: current directory"
required = false

[tools.ls.params.all]
type = "boolean"
description = "Show hidden files. Default: false"
required = false

[tools.ls.params.long]
type = "boolean"
description = "Show type and size. Default: false"
required = false

[tools.ls.params.max_results]
type = "integer"
description = "Maximum entries to return. Default: 200"
required = false

[tools.cat]
kind = "native"
permission = "read_only"
description = """Read a UTF-8 text file like `cat`, safely scoped to the workspace. Prefer `read_file` when numbered lines are useful for editing; use `cat` when raw text is easier.

Example: cat {"path":"pyproject.toml"}
Example: cat {"path":"src/codeagents/runtime.py","offset":40,"limit":60}"""

[tools.cat.params.path]
type = "string"
description = "Relative path to the file"
required = true

[tools.cat.params.offset]
type = "integer"
description = "Starting line number (1-based). Default: 1"
required = false

[tools.cat.params.limit]
type = "integer"
description = "Maximum lines to return. Default: 400"
required = false

[tools.grep]
kind = "native"
permission = "read_only"
description = """Search text like `grep`/`rg` inside the workspace. Use this for exact names, errors, imports, config keys, and symbols.

Example: grep {"query":"PermissionPolicy","path":"src/codeagents"}
Example: grep {"query":"flake8","path":".","ignore_case":true,"max_count":20}"""

[tools.grep.params.query]
type = "string"
description = "Search string or regex pattern"
required = true

[tools.grep.params.path]
type = "string"
description = "Relative file or directory to search. Default: current directory"
required = false

[tools.grep.params.ignore_case]
type = "boolean"
description = "Case-insensitive search. Default: false"
required = false

[tools.grep.params.max_count]
type = "integer"
description = "Maximum matches per searched file. Default: 100"
required = false

[tools.head]
kind = "native"
permission = "read_only"
description = """Read the first lines of a UTF-8 text file. Use it for quick file previews.

Example: head {"path":"README.md","lines":30}"""

[tools.head.params.path]
type = "string"
description = "Relative path to the file"
required = true

[tools.head.params.lines]
type = "integer"
description = "Number of lines. Default: 20"
required = false

[tools.tail]
kind = "native"
permission = "read_only"
description = """Read the last lines of a UTF-8 text file. Use it for logs, generated output, and recent append-only files.

Example: tail {"path":".codeagents/audit.jsonl","lines":20}"""

[tools.tail.params.path]
type = "string"
description = "Relative path to the file"
required = true

[tools.tail.params.lines]
type = "integer"
description = "Number of lines. Default: 20"
required = false

[tools.wc]
kind = "native"
permission = "read_only"
description = """Count lines, words, and bytes for a UTF-8 text file, like `wc`.

Example: wc {"path":"src/codeagents/tools_native/code.py"}"""

[tools.wc.params.path]
type = "string"
description = "Relative path to the file"
required = true

# ─── Web access ──────────────────────────────────────────────────────

[tools.curl]
kind = "native"
permission = "network"
description = """Make a raw HTTP request similar to curl. Use this when the agent needs direct internet access, custom headers, POST/PUT/PATCH/DELETE requests, API calls, or downloading a response to a workspace file. Network permission is required; output files are restricted to the current workspace and cannot be written into `.codeagents`.

Params: `url` (required), `method`, `headers`, `data`, `json`, `output_path`, `timeout`, and `max_chars`. Do not pass both `data` and `json`.

If `output_path` is omitted, the response body is returned as text and HTML is cleaned into readable text. If `output_path` is provided, the response bytes are saved to that path inside the workspace. `max_chars` only applies when returning text.

Example: curl {"url":"https://api.github.com/repos/python/cpython","headers":{"Accept":"application/json"},"max_chars":12000}
Example: curl {"url":"https://example.com/archive.zip","output_path":"downloads/archive.zip","timeout":60}
Example: curl {"url":"https://httpbin.org/post","method":"POST","json":{"hello":"world"}}
Example: curl {"url":"https://httpbin.org/post","method":"POST","data":"name=agent","headers":{"Content-Type":"application/x-www-form-urlencoded"}}"""

[tools.curl.params.url]
type = "string"
description = "HTTP or HTTPS URL to request. Only http(s) URLs are accepted."
required = true

[tools.curl.params.method]
type = "string"
description = "HTTP method. Default: GET"
required = false
enum = ["GET", "POST", "PUT", "PATCH", "DELETE", "HEAD"]

[tools.curl.params.headers]
type = "object"
description = "Optional request headers as a JSON object of string keys and values"
required = false

[tools.curl.params.data]
type = "string"
description = "Optional request body. Use for raw text/form payloads. Do not combine with json."
required = false

[tools.curl.params.json]
type = "object"
description = "Optional JSON request body. Automatically sets Content-Type: application/json unless provided in headers. Do not combine with data."
required = false

[tools.curl.params.output_path]
type = "string"
description = "Optional workspace-relative file path where response bytes should be saved"
required = false

[tools.curl.params.timeout]
type = "integer"
description = "Request timeout in seconds. Default: 30"
required = false

[tools.curl.params.max_chars]
type = "integer"
description = "Maximum returned text characters when output_path is omitted. Default: 12000"
required = false

[tools.web_search]
kind = "native"
permission = "network"
description = """Search the web using cheap/free providers. Provider `auto` first tries local/self-hosted SearXNG (`CODEAGENTS_SEARXNG_URL` or `web.searxng_url` in local config), then falls back to Jina Search (`s.jina.ai`). If Brave, Rambler Proxy, Yandex Search, or GigaChat credentials are configured, those providers can also be used. Transient provider failures are retried several times, and results are cached in `.codeagents/web_cache.sqlite3`.

Use this when the agent needs to discover URLs. Prefer SearXNG for free local search; use Jina Search for no-setup fallback; use Brave or Yandex when configured for more reliable official search. Provider `rambler_proxy` calls the configured Sber/Rambler proxy endpoint directly. Provider `gigachat` uses GigaChat API as an answer fallback and may not return live web URLs unless GigaChat knows them.

Params: `query` (required), `limit`, `provider`, `language`, `time_range`, `searxng_url`, `rambler_proxy_url`, `no_cache`, `ttl_seconds`, `retry_attempts`, and `retry_delay_seconds`.

Example: web_search {"query":"Python venv documentation","limit":5,"retry_attempts":5}
Example: web_search {"query":"site:docs.python.org pathlib Path docs","provider":"searxng","language":"en","limit":10}
Example: web_search {"query":"Qwen coding model release notes","provider":"brave","limit":5,"time_range":"month","retry_attempts":10,"retry_delay_seconds":0.5}
Example: web_search {"query":"последняя версия Python","provider":"rambler_proxy","rambler_proxy_url":"https://search-plugin.example/rambler_proxy","limit":5}
Example: web_search {"query":"последняя версия Python","provider":"yandex","limit":5}
Example: web_search {"query":"кто такая Elma Trou","provider":"gigachat","limit":1}
Example: web_search {"query":"FastAPI release notes","provider":"searxng","searxng_url":"http://127.0.0.1:8080","no_cache":true,"ttl_seconds":300}"""

[tools.web_search.params.query]
type = "string"
description = "Search query. Can include operators such as `site:docs.python.org`."
required = true

[tools.web_search.params.limit]
type = "integer"
description = "Maximum number of results. Default: 5, max: 20"
required = false

[tools.web_search.params.provider]
type = "string"
description = "Search provider: auto, searxng, jina, brave, yandex, yandex_search, rambler_proxy, rambler, or gigachat. Default: auto"
required = false
enum = ["auto", "searxng", "jina", "brave", "yandex", "yandex_search", "rambler_proxy", "rambler", "gigachat"]

[tools.web_search.params.language]
type = "string"
description = "Language code passed to providers when supported, e.g. en or ru"
required = false

[tools.web_search.params.time_range]
type = "string"
description = "SearXNG time filter when supported: day, month, or year"
required = false

[tools.web_search.params.searxng_url]
type = "string"
description = "Override SearXNG base URL. Default: CODEAGENTS_SEARXNG_URL or http://127.0.0.1:8080"
required = false

[tools.web_search.params.rambler_proxy_url]
type = "string"
description = "Override Sber/Rambler proxy endpoint URL. Default: rambler_proxy.url from local config or RAMBLER_PROXY_URL"
required = false

[tools.web_search.params.no_cache]
type = "boolean"
description = "Bypass `.codeagents/web_cache.sqlite3`. Default: false"
required = false

[tools.web_search.params.ttl_seconds]
type = "integer"
description = "Cache TTL in seconds. Default: 3600"
required = false

[tools.web_search.params.retry_attempts]
type = "integer"
description = "Retry attempts per provider for transient network failures. Default: 5, max: 15"
required = false

[tools.web_search.params.retry_delay_seconds]
type = "number"
description = "Delay between retry attempts in seconds. Default: 0.25, max: 5.0"
required = false

[tools.docs_search]
kind = "native"
permission = "network"
description = """Search documentation-oriented web results. If `domain` is set, the tool searches with `site:<domain>`. If `fetch_results=true`, it internally fetches the top result pages and returns readable snippets. Results use the same cheap/free provider stack and cache as `web_search`.

Use this for agent coding tasks like "read the latest docs for FastAPI dependency injection" or "find the official pytest tmp_path docs". Prefer `domain` when you know the official docs site.

Params: `query` (required), `domain`, `limit`, `fetch_results`, `max_fetch`, `retry_attempts`, `retry_delay_seconds`, `max_chars`, and `provider`.

Example: docs_search {"query":"venv create environment","domain":"docs.python.org","limit":5,"fetch_results":true,"max_fetch":2,"max_chars":6000,"retry_attempts":5,"retry_delay_seconds":0.25}
Example: docs_search {"query":"pytest tmp_path fixture","domain":"docs.pytest.org","limit":3}
Example: docs_search {"query":"ruff configuration pyproject","provider":"brave","limit":5}"""

[tools.docs_search.params.query]
type = "string"
description = "Documentation search query"
required = true

[tools.docs_search.params.domain]
type = "string"
description = "Optional domain to restrict with site:, e.g. docs.python.org"
required = false

[tools.docs_search.params.limit]
type = "integer"
description = "Maximum search results. Default: 5, max: 10"
required = false

[tools.docs_search.params.fetch_results]
type = "boolean"
description = "Fetch top result pages internally and include readable snippets. Default: false"
required = false

[tools.docs_search.params.max_fetch]
type = "integer"
description = "How many result URLs to fetch when fetch_results=true. Default: 2, max: 5"
required = false

[tools.docs_search.params.retry_attempts]
type = "integer"
description = "Retry attempts per provider for transient network failures in search and fetch phases. Default: 5, max: 15"
required = false

[tools.docs_search.params.retry_delay_seconds]
type = "number"
description = "Delay between retry attempts in seconds. Default: 0.25, max: 5.0"
required = false

[tools.docs_search.params.max_chars]
type = "integer"
description = "Max chars per fetched page. Default: 6000"
required = false

[tools.docs_search.params.provider]
type = "string"
description = "Search provider: auto, searxng, jina, or brave. Default: auto"
required = false
enum = ["auto", "searxng", "jina", "brave"]

[tools.rm]
kind = "native"
permission = "shell_dangerous"
description = """Remove (delete) a file or directory from the current workspace. This is the safe tool equivalent of the Unix `rm` command: `rm` means "remove" and permanently deletes filesystem entries. It never accepts absolute paths outside the workspace, refuses to delete the workspace root, and refuses to delete CodeAgents internal state.

This tool ALWAYS requires user confirmation in the TUI before it runs. In the TUI, the agent hands control to the user: Enter/y approves, Esc/n rejects. Use `recursive=true` only for directories. Use `force=true` only when it is acceptable for a missing path to be treated as success.

Example: rm {"path":"old_file.py"}
Example: rm {"path":"build_output","recursive":true}
Example: rm {"path":"maybe_missing.tmp","force":true}"""

[tools.rm.params.path]
type = "string"
description = "Relative path inside the current workspace to delete. Absolute paths and paths escaping the workspace are rejected."
required = true

[tools.rm.params.recursive]
type = "boolean"
description = "Required to remove directories. Default: false. Keep false when deleting a normal file."
required = false

[tools.rm.params.force]
type = "boolean"
description = "If true, missing paths return status=missing instead of an error. Default: false."
required = false

# ─── File writing ────────────────────────────────────────────────────

[tools.write_file]
kind = "native"
permission = "workspace_write"
description = """Write full content to a file in the workspace. Creates parent directories and overwrites existing files. Use for new files or complete rewrites; for targeted changes prefer `edit_file`.

Params: `path` (required) and `content` (required).

Example: write_file {"path":"notes.md","content":"# Notes\\n"}
Example: write_file {"path":"src/package/__init__.py","content":"# Package marker\\n"}"""

[tools.write_file.params.path]
type = "string"
description = "Relative path to write"
required = true

[tools.write_file.params.content]
type = "string"
description = "Complete file content to write"
required = true

# ─── File creation ───────────────────────────────────────────────────

[tools.create_file]
kind = "native"
permission = "workspace_write"
description = """Create a new file in the workspace. Fails if the file already exists. Use `write_file` only when overwriting is intentional.

Params: `path` (required) and `content` (required).

Example: create_file {"path":"tests/test_new_feature.py","content":"def test_smoke():\\n    assert True\\n"}"""

[tools.create_file.params.path]
type = "string"
description = "Relative path for the new file"
required = true

[tools.create_file.params.content]
type = "string"
description = "File content"
required = true

# ─── File editing ────────────────────────────────────────────────────

[tools.edit_file]
kind = "native"
permission = "workspace_write"
description = """Apply one or more line-based edits to a file. Preferred form: pass `edits`, a list of {line, old_lines, new_lines} objects.

`line` is a 1-based line number in the ORIGINAL file (not the in-progress edited version). `old_lines` MUST match the file at that position exactly (without trailing newlines). `new_lines` is the replacement (also without trailing newlines). Edits are applied bottom-up so line numbers stay valid. Atomic write: the file is replaced via a temp file. Returns a unified diff.

Params: `path` (required), `edits`, `old_text`, and `new_text`. Preferred form uses `edits`. Legacy form (still supported): pass `old_text` and `new_text` for a single string substitution. `old_text` must match exactly one location.

Example: edit_file {"path":"src/app.py","edits":[{"line":10,"old_lines":["def hello():","    return 'world'"],"new_lines":["def hello(name: str):","    return f'hello {name}'"]}]}
Example: edit_file {"path":"README.md","old_text":"old title","new_text":"new title"}"""

[tools.edit_file.params.path]
type = "string"
description = "Relative path to the file"
required = true

[tools.edit_file.params.edits]
type = "array"
description = """Preferred. Array of edit objects. Each item: {line: int (1-based, in original file), old_lines: [string,...] (exact lines without newline), new_lines: [string,...] (replacement lines without newline)}. Example:
[{"line": 10, "old_lines": ["def hello():", "    return 'world'"], "new_lines": ["def hello(name: str):", "    return f'hello {name}'"]}]"""
required = false

[tools.edit_file.params.old_text]
type = "string"
description = "Legacy: exact text to find and replace (must be unique in the file). Prefer `edits` for new calls."
required = false

[tools.edit_file.params.new_text]
type = "string"
description = "Legacy: replacement text. Required when old_text is used."
required = false

# ─── Directory listing ───────────────────────────────────────────────

[tools.list_directory]
kind = "native"
permission = "read_only"
description = """List files and directories with type, size, and name. Use this for project exploration and broad structure; use `ls` for a shell-like listing.

Example: list_directory {"path":".","recursive":false,"max_depth":2}
Example: list_directory {"path":"src","recursive":true,"max_depth":3}"""

[tools.list_directory.params.path]
type = "string"
description = "Relative directory path. Default: current directory"
required = false

[tools.list_directory.params.recursive]
type = "boolean"
description = "List subdirectories recursively. Default: false"
required = false

[tools.list_directory.params.max_depth]
type = "integer"
description = "Maximum depth for recursive listing. Default: 2"
required = false

# ─── Glob search ─────────────────────────────────────────────────────

[tools.glob_files]
kind = "native"
permission = "read_only"
description = """Find files matching a glob pattern. Use this to locate files by name, extension, or directory pattern.

Example: glob_files {"pattern":"**/*.py","max_results":100}
Example: glob_files {"pattern":"tests/test_*.py"}"""

[tools.glob_files.params.pattern]
type = "string"
description = "Glob pattern, e.g. '**/*.py', 'src/**/*.rs', '*.toml'"
required = true

[tools.glob_files.params.max_results]
type = "integer"
description = "Maximum number of results. Default: 100"
required = false

# ─── Text search ─────────────────────────────────────────────────────

[tools.search]
kind = "native"
permission = "read_only"
description = """Search for text or regex in the workspace using ripgrep when available. Returns file:line:match. Use for definitions, usages, error strings, imports, and config keys.

Example: search {"query":"def run_python","max_count":20}
Example: search {"query":"SHELL_DANGEROUS","max_count":50}"""

[tools.search.params.query]
type = "string"
description = "Search string or regex pattern"
required = true

[tools.search.params.max_count]
type = "integer"
description = "Maximum number of matches. Default: 50"
required = false

# ─── Patch proposal ──────────────────────────────────────────────────

[tools.propose_patch]
kind = "native"
permission = "propose"
description = """Generate a unified diff showing proposed changes without applying them. Use when you want to show a full-file proposal before writing.

Params: `path` (required) and `new_text` (required).

Example: propose_patch {"path":"README.md","new_text":"# New README\\n"}"""

[tools.propose_patch.params.path]
type = "string"
description = "Relative path to the file"
required = true

[tools.propose_patch.params.new_text]
type = "string"
description = "Full new file content"
required = true

# ─── Directory creation ───────────────────────────────────────────────

[tools.mkdir]
kind = "native"
permission = "workspace_write"
description = """Create a directory inside the current workspace. Use this before writing files into a new folder, creating project structure, or preparing a download directory. This tool never creates directories outside the workspace and refuses to write inside `.codeagents`.

Example: mkdir {"path":"src/components"}
Example: mkdir {"path":"downloads/assets","parents":true,"exist_ok":true}"""

[tools.mkdir.params.path]
type = "string"
description = "Workspace-relative directory path to create"
required = true

[tools.mkdir.params.parents]
type = "boolean"
description = "Create missing parent directories. Default: true"
required = false

[tools.mkdir.params.exist_ok]
type = "boolean"
description = "Return success if the directory already exists. Default: true"
required = false

# ─── Move / rename ────────────────────────────────────────────────────

[tools.mv]
kind = "native"
permission = "workspace_write"
description = """Move or rename a file or directory inside the current workspace. Use this for renaming files, moving generated assets into place, reorganizing folders, or moving downloaded files. This tool never moves paths outside the workspace and refuses to move anything into or out of `.codeagents`.

By default, it refuses to overwrite an existing destination. Pass `overwrite=true` only when replacing the destination is intended.

Example: mv {"source":"old_name.py","destination":"src/new_name.py"}
Example: mv {"source":"downloads/archive.zip","destination":"assets/archive.zip","overwrite":true}
Example: mv {"source":"tmp/generated","destination":"src/generated"}"""

[tools.mv.params.source]
type = "string"
description = "Workspace-relative source file or directory path"
required = true

[tools.mv.params.destination]
type = "string"
description = "Workspace-relative destination file or directory path"
required = true

[tools.mv.params.overwrite]
type = "boolean"
description = "Replace existing destination file or directory. Default: false"
required = false

# ─── Shell commands ──────────────────────────────────────────────────

[tools.safe_shell]
kind = "native"
permission = "shell_safe"
description = """Run an allowlisted shell command in the workspace. Prefer dedicated tools (`run_python`, `python_module`, `flake8`, `grep`, `git_status`, `git_diff`) when possible. This is for safe checks only, not destructive operations.

Params: `command`, `argv`, `cwd`, and `timeout`. Pass either `command` (string) or `argv` (array of strings). `cwd` is an optional workspace-relative directory. `timeout` defaults to 60 seconds.

The command executable must be allowlisted. Limited shell syntax is supported for allowlisted commands: `cd <workspace path> && ...`, `&&`, `||`, pipes, and `2>&1`, so checks like `cargo check 2>&1 | head -50` work. Unsafe shell features such as variables, command substitution, semicolons, and multiline commands are rejected. Use confirmation-gated `shell` for arbitrary commands.

Example: safe_shell {"command":"cargo check"}
Example: safe_shell {"command":"cargo check 2>&1 | head -50","cwd":"crates/terminal-agent","timeout":120}
Example: safe_shell {"argv":["python","-m","compileall","src"],"timeout":120}"""

[tools.safe_shell.params.command]
type = "string"
description = "Command string to run. The executable must be allowlisted. May use limited shell syntax for allowlisted commands."
required = false

[tools.safe_shell.params.argv]
type = "array"
description = "Command argv array. Use this when no shell syntax is needed, e.g. [\"python\", \"-m\", \"compileall\", \"src\"]."
required = false

[tools.safe_shell.params.cwd]
type = "string"
description = "Workspace-relative directory to run from. Default: workspace root."
required = false

[tools.safe_shell.params.timeout]
type = "integer"
description = "Timeout in seconds. Default: 60"
required = false

[tools.run_python]
kind = "native"
permission = "shell_safe"
description = """Run a Python file inside the workspace. If `conda_activate` selected an environment, this uses `conda run -n <env> python ...`; otherwise it uses `python3`. Use this to execute code the agent wrote.

Params: `path` (required), `args`, `module`, and `timeout`. If `module=true`, the path is converted to a module name and run with `python -m`.

Example: run_python {"path":"tetris.py"}
Example: run_python {"path":"scripts/check.py","args":["--verbose"],"timeout":120}
Example: run_python {"path":"src/package/cli.py","module":true,"args":["--help"]}"""

[tools.run_python.params.path]
type = "string"
description = "Relative path to the Python file"
required = true

[tools.run_python.params.args]
type = "array"
description = "Arguments passed to the script"
required = false

[tools.run_python.params.module]
type = "boolean"
description = "Run the path as a module name derived from the path. Default: false"
required = false

[tools.run_python.params.timeout]
type = "integer"
description = "Timeout in seconds. Default: 60"
required = false

[tools.python_module]
kind = "native"
permission = "shell_safe"
description = """Run `python -m <module>` inside the workspace. If a conda env is active for this workspace, it runs inside that env. Use for pytest, compileall, package entrypoints, and modules like `tetris`.

Example: python_module {"module":"pytest","args":["-q"],"timeout":120}
Example: python_module {"module":"compileall","args":["src"]}"""

[tools.python_module.params.module]
type = "string"
description = "Python module name, e.g. pytest or tetris"
required = true

[tools.python_module.params.args]
type = "array"
description = "Arguments passed after the module name"
required = false

[tools.python_module.params.timeout]
type = "integer"
description = "Timeout in seconds. Default: 60"
required = false

[tools.flake8]
kind = "native"
permission = "shell_safe"
description = """Run `python -m flake8` on a workspace file or directory. If flake8 is missing, the result includes a hint to install it with `pip_install` or conda. Use after edits to catch style and syntax issues.

Example: flake8 {"path":"src","args":["--max-line-length=100"],"timeout":120}
Example: flake8 {"path":"tests"}"""

[tools.flake8.params.path]
type = "string"
description = "Relative file or directory to lint. Default: current directory"
required = false

[tools.flake8.params.args]
type = "array"
description = "Extra flake8 arguments"
required = false

[tools.flake8.params.timeout]
type = "integer"
description = "Timeout in seconds. Default: 60"
required = false

[tools.pip_install]
kind = "native"
permission = "network"
description = """Install Python dependencies with `python -m pip install` in the active interpreter or selected conda env. This may access the network and therefore can require user approval depending on policy.

Example: pip_install {"packages":["pytest","flake8"]}
Example: pip_install {"requirements":"requirements.txt","upgrade":true,"timeout":600}"""

[tools.pip_install.params.packages]
type = "array"
description = "Packages to install"
required = false

[tools.pip_install.params.requirements]
type = "string"
description = "Relative requirements file path"
required = false

[tools.pip_install.params.upgrade]
type = "boolean"
description = "Pass --upgrade. Default: false"
required = false

[tools.pip_install.params.timeout]
type = "integer"
description = "Timeout in seconds. Default: 600"
required = false

[tools.shell]
kind = "native"
permission = "shell_dangerous"
description = """Run an arbitrary installed shell command in the workspace, including commands that do not have a dedicated tool such as `ollama list`. This is dangerous and requires explicit user confirmation in the TUI. Prefer dedicated tools when they exist.

Params: `command` (required), `cwd`, and `timeout`. `cwd` is an optional workspace-relative directory. `timeout` defaults to 60 seconds.

Persistent approval is scoped to the first executable name for simple commands. For example, approving `ollama list` with "always" allows future `ollama ...` commands in this workspace, but does not approve all shell commands. Compound shell syntax such as `;`, `&&`, pipes, redirects, variables, and subcommands can only be approved once and will not be remembered.

Do not use this for file deletion; use `rm`, which is workspace-scoped and has extra safety checks.

Example: shell {"command":"ollama list"}
Example: shell {"command":"brew --version"}
Example: shell {"command":"python scripts/local_tool.py --check","cwd":"tools","timeout":120}"""

[tools.shell.params.command]
type = "string"
description = "Shell command to run from the workspace root. Simple commands can be remembered per executable name; compound shell syntax requires one-time approval."
required = true

[tools.shell.params.timeout]
type = "integer"
description = "Timeout in seconds. Default: 60"
required = false

[tools.shell.params.cwd]
type = "string"
description = "Workspace-relative directory to run from. Default: workspace root."
required = false

# ─── Conda environments ──────────────────────────────────────────────

[tools.conda_env_list]
kind = "native"
permission = "read_only"
description = """List conda environments using `conda env list --json`. Use before selecting or creating an environment.

Example: conda_env_list {}"""

[tools.conda_create]
kind = "native"
permission = "network"
description = """Create a conda environment with `conda create -y -n <name> ...`. This may download packages and can require user approval depending on network policy.

Example: conda_create {"name":"codeagents-test","python":"3.11","packages":["pytest","flake8"],"timeout":1200}"""

[tools.conda_create.params.name]
type = "string"
description = "Conda environment name"
required = true

[tools.conda_create.params.python]
type = "string"
description = "Python version, e.g. 3.11. Default: conda default"
required = false

[tools.conda_create.params.packages]
type = "array"
description = "Packages to install while creating the environment"
required = false

[tools.conda_create.params.timeout]
type = "integer"
description = "Timeout in seconds. Default: 1200"
required = false

[tools.conda_activate]
kind = "native"
permission = "shell_safe"
description = """Select a conda environment for future Python tools in this workspace. This is not shell `source activate`; it stores the selected env in `.codeagents/active_conda_env.json`, and `run_python`, `python_module`, `flake8`, and `pip_install` then use `conda run -n <name>`.

Example: conda_activate {"name":"agents"}"""

[tools.conda_activate.params.name]
type = "string"
description = "Conda environment name"
required = true

[tools.conda_deactivate]
kind = "native"
permission = "shell_safe"
description = """Clear the active conda environment for this workspace. Future Python tools go back to default `python3`.

Example: conda_deactivate {}"""

[tools.conda_run]
kind = "native"
permission = "shell_safe"
description = """Run an allowlisted command inside a conda environment using `conda run -n <name> ...`. Use this when a dedicated tool is not enough. The command must be allowlisted.

Example: conda_run {"name":"agents","command":"python -m pytest -q","timeout":120}
Example: conda_run {"command":"python -m flake8 src","timeout":120}"""

[tools.conda_run.params.command]
type = "string"
description = "Command to run, e.g. 'python -m pytest'"
required = true

[tools.conda_run.params.name]
type = "string"
description = "Conda environment name. Defaults to active env"
required = false

[tools.conda_run.params.timeout]
type = "integer"
description = "Timeout in seconds. Default: 60"
required = false

# ─── Git ─────────────────────────────────────────────────────────────

[tools.git_diff]
kind = "native"
permission = "read_only"
description = """Show git diff for the workspace. Use to review pending changes before summarizing or committing.

Example: git_diff {}
Example: git_diff {"staged":true}"""

[tools.git_diff.params.staged]
type = "boolean"
description = "Show staged changes instead of unstaged. Default: false"
required = false

[tools.git_status]
kind = "native"
permission = "read_only"
description = """Show git status: modified, added, deleted, and untracked files.

Example: git_status {}"""

# ─── Testing ─────────────────────────────────────────────────────────

[tools.run_tests]
kind = "native"
permission = "shell_safe"
description = """Run a common test or check suite. `python` runs compileall, `pytest` runs pytest through Python, `flake8` runs the flake8 tool, `rust` runs cargo test, and `cargo-check` runs cargo check.

Example: run_tests {"suite":"python"}
Example: run_tests {"suite":"pytest"}
Example: run_tests {"suite":"flake8"}"""

[tools.run_tests.params.suite]
type = "string"
description = "Test suite to run"
required = false
enum = ["python", "pytest", "flake8", "rust", "cargo-check"]

